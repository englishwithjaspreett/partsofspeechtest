<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Parts of Speech Quiz (1000-ready)</title></head>
<body style="font-family:Georgia;background:#111;color:#eee">
<h2>Parts of Speech Quiz</h2>
<p>This template is ready for up to 1000+ questions.</p>
<div id="q"></div>
<div id="opts"></div>
<div id="score"></div>
<script>
const questions=[];
for(let i=1;i<=1000;i++){
  questions.push({
    sentence:`Question ${i}: He is a <strong>teacher</strong>.`,
    answer:"Noun"
  });
}
let idx=0,score=0,time=30,t;
function render(){
 if(idx>=questions.length){document.body.innerHTML=`<h1>Finished</h1><h2>${score}/${questions.length}</h2>`;return;}
 q.innerHTML=`<p>Question ${idx+1} of ${questions.length}</p><h3>${questions[idx].sentence}</h3><p>Time: <span id='tm'>30</span></p>`;
 opts.innerHTML="";
 ["Noun","Verb","Adjective","Adverb"].forEach(o=>{
   let b=document.createElement("button");
   b.textContent=o;
   b.style.margin="6px";b.style.padding="12px";
   b.onclick=()=>ans(o);
   opts.appendChild(b);
 });
 time=30;clearInterval(t);
 t=setInterval(()=>{time--;document.getElementById("tm").textContent=time;if(time<=0){clearInterval(t);idx++;render();}},1000);
}
function ans(a){clearInterval(t);if(a===questions[idx].answer)score++;idx++;render();}
render();
</script>
</body></html>
