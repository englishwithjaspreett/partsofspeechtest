<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parts of Speech Test</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Georgia, "Times New Roman", serif;
    background:#0f0f0f;
    color:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:30px;
}

.card{
    width:100%;
    max-width:760px;
    background:#171717;
    border:1px solid #2d2d2d;
    border-radius:18px;
    padding:55px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:45px;
}

.questionNo{
    color:#9f9f9f;
    text-transform:uppercase;
    letter-spacing:2px;
    font-size:14px;
}

.timer{
    width:65px;
    height:65px;
    border-radius:50%;
    border:2px solid #505050;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    font-weight:bold;
}

.prompt{
    color:#b8b8b8;
    font-size:20px;
    line-height:1.7;
    margin-bottom:20px;
}

.sentence{
    font-size:42px;
    line-height:1.6;
    margin-bottom:45px;
}

.sentence strong{
    color:#ffffff;
    text-decoration:underline;
    text-decoration-thickness:2px;
    text-underline-offset:8px;
}

.options{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}

.option{
    padding:18px;
    background:#101010;
    color:#f5f5f5;
    border:1px solid #333;
    border-radius:12px;
    font-family:Georgia, serif;
    font-size:20px;
    cursor:pointer;
    transition:.25s;
}

.option:hover{
    background:#fff;
    color:#111;
    border-color:#fff;
}

.result{
    text-align:center;
}

.result h2{
    font-size:36px;
    margin-bottom:10px;
}

.result p{
    color:#aaa;
    margin-top:10px;
}

.result h1{
    font-size:72px;
    margin:25px 0;
}

.restart{
    margin-top:20px;
    width:100%;
    padding:18px;
    background:#fff;
    color:#000;
    border:none;
    border-radius:12px;
    font-family:Georgia, serif;
    font-size:20px;
    cursor:pointer;
}

@media(max-width:600px){

.card{
    padding:30px;
}

.sentence{
    font-size:30px;
}

.options{
    grid-template-columns:1fr;
}

.option{
    font-size:18px;
}

}
</style>
</head>

<body>

<div class="card">

<div class="header">

<div class="questionNo">
Question <span id="qNo">1</span> of 100
</div>

<div class="timer">
<span id="timer">30</span>
</div>

</div>

<div class="prompt">
Identify the part of speech of the <strong>highlighted</strong> word.
</div>

<div class="sentence" id="sentence"></div>

<div class="options">

<button class="option" onclick="submitAnswer('Noun')">Noun</button>

<button class="option" onclick="submitAnswer('Verb')">Verb</button>

<button class="option" onclick="submitAnswer('Adjective')">Adjective</button>

<button class="option" onclick="submitAnswer('Adverb')">Adverb</button>

</div>

</div>

<script>

const questions = [
{ sentence:'The <strong>teacher</strong> is kind.', answer:'Noun' },
{ sentence:'My brother <strong>plays</strong> football.', answer:'Verb' },
{ sentence:'She wore a <strong>red</strong> dress.', answer:'Adjective' },
{ sentence:'The baby smiled <strong>happily</strong>.', answer:'Adverb' },
{ sentence:'The <strong>cat</strong> is under the chair.', answer:'Noun' },
{ sentence:'They are my <strong>classmates</strong>.', answer:'Noun' },
{ sentence:'Tea and coffee are <strong>hot</strong> drinks.', answer:'Adjective' },
{ sentence:'Wow! That is <strong>amazing</strong>.', answer:'Adjective' },
{ sentence:'I have a <strong>pencil</strong>.', answer:'Noun' },
{ sentence:'The children are <strong>outside</strong>.', answer:'Adverb' },
{ sentence:'The <strong>doctor</strong> helped the patient.', answer:'Noun' },
{ sentence:'Birds <strong>build</strong> nests.', answer:'Verb' },
{ sentence:'It is a <strong>beautiful</strong> garden.', answer:'Adjective' },
{ sentence:'He answered <strong>politely</strong>.', answer:'Adverb' },
{ sentence:'The <strong>keys</strong> are inside the bag.', answer:'Noun' },
{ sentence:'She loves <strong>music</strong>.', answer:'Noun' },
{ sentence:'You can <strong>stay</strong>, or you can leave.', answer:'Verb' },
{ sentence:'Hurray! We <strong>won</strong> the match.', answer:'Verb' },
{ sentence:'She <strong>ate</strong> an orange.', answer:'Verb' },
{ sentence:'The bus stopped <strong>here</strong>.', answer:'Adverb' },
{ sentence:'The <strong>lion</strong> roared loudly.', answer:'Noun' },
{ sentence:'She <strong>writes</strong> neatly.', answer:'Verb' },
{ sentence:'The soup is <strong>hot</strong>.', answer:'Adjective' },
{ sentence:'He finished the work <strong>quickly</strong>.', answer:'Adverb' },
{ sentence:'The <strong>lamp</strong> is on the table.', answer:'Noun' },
{ sentence:'We <strong>enjoyed</strong> the picnic.', answer:'Verb' },
{ sentence:'I was <strong>tired</strong>, but I continued.', answer:'Adjective' },
{ sentence:'Oops! I <strong>dropped</strong> my phone.', answer:'Verb' },
{ sentence:'He bought a <strong>bicycle</strong>.', answer:'Noun' },
{ sentence:'Please wait <strong>there</strong>.', answer:'Adverb' },
{ sentence:'The <strong>farmer</strong> grows wheat.', answer:'Noun' },
{ sentence:'The dog <strong>barked</strong> all night.', answer:'Verb' },
{ sentence:'It was a <strong>sunny</strong> day.', answer:'Adjective' },
{ sentence:'She spoke <strong>softly</strong>.', answer:'Adverb' },
{ sentence:'The <strong>school</strong> is near the park.', answer:'Noun' },
{ sentence:'He is my <strong>cousin</strong>.', answer:'Noun' },
{ sentence:'Study <strong>hard</strong>, because exams are near.', answer:'Adverb' },
{ sentence:'Alas! We <strong>missed</strong> the train.', answer:'Verb' },
{ sentence:'This is an <strong>umbrella</strong>.', answer:'Noun' },
{ sentence:'The children gathered <strong>together</strong>.', answer:'Adverb' },
{ sentence:'The <strong>artist</strong> painted a portrait.', answer:'Noun' },
{ sentence:'My mother <strong>cooks</strong> delicious food.', answer:'Verb' },
{ sentence:'He lives in a <strong>small</strong> village.', answer:'Adjective' },
{ sentence:'The train arrived <strong>early</strong>.', answer:'Adverb' },
{ sentence:'The <strong>picture</strong> hangs above the sofa.', answer:'Noun' },
{ sentence:'I <strong>enjoy</strong> reading books.', answer:'Verb' },
{ sentence:'You may call me if you <strong>need</strong> help.', answer:'Verb' },
{ sentence:'Bravo! You <strong>performed</strong> well.', answer:'Verb' },
{ sentence:'She found a <strong>coin</strong>.', answer:'Noun' },
{ sentence:'The birds flew <strong>away</strong>.', answer:'Adverb' },
{ sentence:'The <strong>pilot</strong> flew the airplane.', answer:'Noun' },
{ sentence:'The baby <strong>cried</strong> loudly.', answer:'Verb' },
{ sentence:'She wore a <strong>yellow</strong> hat.', answer:'Adjective' },
{ sentence:'The rabbit ran <strong>fast</strong>.', answer:'Adverb' },
{ sentence:'The <strong>shoes</strong> are beside the bed.', answer:'Noun' },
{ sentence:'You are my <strong>best</strong> friend.', answer:'Adjective' },
{ sentence:'She smiled because she was <strong>happy</strong>.', answer:'Adjective' },
{ sentence:'Oops! The glass <strong>broke</strong>.', answer:'Verb' },
{ sentence:'He has a <strong>new</strong> watch.', answer:'Adjective' },
{ sentence:'Please come <strong>inside</strong>.', answer:'Adverb' },
{ sentence:'The <strong>chef</strong> prepared dinner.', answer:'Noun' },
{ sentence:'The horse <strong>jumped</strong> over the fence.', answer:'Verb' },
{ sentence:'We visited an <strong>old</strong> castle.', answer:'Adjective' },
{ sentence:'She completed the test <strong>easily</strong>.', answer:'Adverb' },
{ sentence:'The ball <strong>rolled</strong> across the road.', answer:'Verb' },
{ sentence:'They <strong>visited</strong> the museum.', answer:'Verb' },
{ sentence:'He worked <strong>hard</strong>, so he succeeded.', answer:'Adverb' },
{ sentence:'Oh! I <strong>forgot</strong> your name.', answer:'Verb' },
{ sentence:'She bought an <strong>egg</strong>.', answer:'Noun' },
{ sentence:'Stand <strong>there</strong> quietly.', answer:'Adverb' },
{ sentence:'The <strong>firefighter</strong> saved the family.', answer:'Noun' },
{ sentence:'The students <strong>listened</strong> carefully.', answer:'Verb' },
{ sentence:'The water is <strong>cold</strong>.', answer:'Adjective' },
{ sentence:'He spoke <strong>clearly</strong>.', answer:'Adverb' },
{ sentence:'The picture is behind the <strong>door</strong>.', answer:'Noun' },
{ sentence:'It looks <strong>beautiful</strong>.', answer:'Adjective' },
{ sentence:'I stayed home although it was <strong>sunny</strong>.', answer:'Adjective' },
{ sentence:'Hurray! <strong>School</strong> is over.', answer:'Noun' },
{ sentence:'He needs a <strong>notebook</strong>.', answer:'Noun' },
{ sentence:'The dog waited <strong>outside</strong>.', answer:'Adverb' },
{ sentence:'The <strong>driver</strong> stopped the bus.', answer:'Noun' },
{ sentence:'The children <strong>laughed</strong> together.', answer:'Verb' },
{ sentence:'She has <strong>long</strong> hair.', answer:'Adjective' },
{ sentence:'The baby slept <strong>peacefully</strong>.', answer:'Adverb' },
{ sentence:'The lamp is above the <strong>mirror</strong>.', answer:'Noun' },
{ sentence:'We <strong>finished</strong> the project.', answer:'Verb' },
{ sentence:'Tea or coffee is <strong>available</strong>.', answer:'Adjective' },
{ sentence:'Bravo! You <strong>answered</strong> correctly.', answer:'Verb' },
{ sentence:'There is an <strong>owl</strong> in the tree.', answer:'Noun' },
{ sentence:'The train stopped <strong>nearby</strong>.', answer:'Adverb' },
{ sentence:'The <strong>baby</strong> drank milk.', answer:'Noun' },
{ sentence:'My father <strong>drives</strong> carefully.', answer:'Verb' },
{ sentence:'She wore a <strong>warm</strong> sweater.', answer:'Adjective' },
{ sentence:'The birds flew <strong>high</strong>.', answer:'Adverb' },
{ sentence:'The <strong>books</strong> are between the boxes.', answer:'Noun' },
{ sentence:'He <strong>opened</strong> the window.', answer:'Verb' },
{ sentence:'She <strong>smiled</strong> while reading.', answer:'Verb' },
{ sentence:'Ah! Now I <strong>understand</strong>.', answer:'Verb' },
{ sentence:'He adopted a <strong>puppy</strong>.', answer:'Noun' },
{ sentence:'The children ran <strong>home</strong>.', answer:'Adverb' },
];

let current=0;
let score=0;
let seconds=30;
let countdown;
let answered=false;

function loadQuestion(){

answered=false;

document.getElementById("qNo").textContent=current+1;

document.getElementById("sentence").innerHTML=
questions[current].sentence;

seconds=30;

document.getElementById("timer").textContent=seconds;

clearInterval(countdown);

countdown=setInterval(()=>{

seconds--;

document.getElementById("timer").textContent=seconds;

if(seconds<=0){

if(answered) return;
answered=true;

clearInterval(countdown);

current++;

if(current<questions.length){

loadQuestion();

}else{

showResult();

}

}

},1000);

}

function submitAnswer(choice){

if(answered) return;
answered=true;

clearInterval(countdown);

if(choice===questions[current].answer){

score++;

}

current++;

if(current<questions.length){

loadQuestion();

}else{

showResult();

}

}

function showResult(){

document.querySelector(".card").innerHTML=`

<div class="result">

<h2>Test Completed</h2>

<p>Your Score</p>

<h1>${score}/${questions.length}</h1>

<button class="restart" onclick="location.reload()">
Try Again
</button>

</div>

`;

}

loadQuestion();

</script>

</body>
</html>
